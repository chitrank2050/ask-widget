name: Bug Report
description: Something is broken
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: The widget does not open when clicking the button on mobile...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Import ChatWidget
        2. Set position="bottom-right"
        3. Click the button on iOS Safari
        4. Nothing happens
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      placeholder: The chat panel should open.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: 0.1.0
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: React 18, Next.js 14, Safari 17, iOS 17
    validations:
      required: true

  - type: textarea
    id: code
    attributes:
      label: Minimal reproduction
      render: tsx
